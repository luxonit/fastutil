# This workflow will build a Java project with Ant
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-ant

name: Java CI

on:
  push:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Java CI Build
    steps:
    - uses: actions/checkout@v4
      name: Checkout git
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'
        
    - name: Pull Java Sources
      run: make sources
      
    - name: Build JAR with Ant
      run: ant jar -noinput -buildfile build.xml
      
    - name: Build JAVADOC with Ant
      run: ant javadoc -noinput -buildfile build.xml
      
    - name: Test with Ant
      run: ant junit -noinput -buildfile build.xml
      
    - name: Split JARs
      if: false #Disabled for now
      run: ./split.sh
      
    - name: Build OSGI-REST with Ant
      if: false #Disabled for now
      run: ant osgi-rest -noinput -buildfile build.xml
      
    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v6
      if: always() 
      with:
        commit: ${{github.event.action.head_sha}}
        report_paths: '**/reports/TEST-*.xml'
        # Optional: if you want to add PR comments from workflow_run context  
        comment: true
        pr_id: ${{ github.event.action.pull_requests[0].number }}

    - name: Upload JAR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fastutil-jar-artifacts
        path: '**/*.jar'
        
    - name: Upload Documentation Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fastutil-docs-artifacts
        path: '**/docs/'

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always() # always run even if the previous step fails
      with:
        name: junit-test-results
        path: '**/reports/TEST-*.xml'
        retention-days: 14
